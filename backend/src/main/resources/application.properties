spring.application.name=backend

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/decorruptifydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true

server.port=8080

# JWT
jwt.secret=ZGVjb3JydXB0aWZ5LXNlY3JldC1rZXktZm9yLWp3dC0yMDI1LXVuaS1wcm9qZWN0
jwt.expiration=86400000

# SpringDoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# File paths — relative to backend/ working directory (where ./gradlew bootRun is run)
app.legal-texts.akoma-ntoso-dir=../../legal-texts/akoma-ntoso
app.legal-texts.pdf-dir=../../data/laws
app.judgements.metadata-dir=../../judgements/metadata
